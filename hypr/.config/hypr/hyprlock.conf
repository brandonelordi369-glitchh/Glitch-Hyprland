# ============================================================================
# Hyprlock Configuration with Music Player Widget
# ============================================================================
# ----------------------------------------------------------------------------
# Background
# ----------------------------------------------------------------------------
background {
    monitor =
    path = /home/halcyon/Pictures/wallhaven-3qlxjy_1920x1080.png
    blur_passes = 2
    contrast = 0.9651
    brightness = 0.5500
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
    # noise = 0.03
}
# ----------------------------------------------------------------------------
# General Settings
# ----------------------------------------------------------------------------
general {
    ignore_empty_input = true
    hide_cursor = true
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}
# ----------------------------------------------------------------------------
# Animations
# ----------------------------------------------------------------------------
animations {
    animation = fade, 1, 6, default
    animation = fadeIn, 1, 6, default
    animation = fadeOut, 1, 6, default
}
# ----------------------------------------------------------------------------
# Clock & Date Display
# ----------------------------------------------------------------------------
# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 120
    font_family = Carbona Test Bold
    position = 0, 250
    halign = center
    valign = center
}
# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    font_family = Carbona Test
    position = 0, 350
    halign = center
    valign = center
}
# Lock Icon
label {
    monitor =
    # text = <span> </span>
    text = <span></span>
    color = rgba(216, 222, 233, 0.70)
    font_size = 24
    font_family = OpenDyslexicAlt Nerd Font Propo
    position = 0, -110
    halign = center
    valign = top
}
# ----------------------------------------------------------------------------
# User Profile
# ----------------------------------------------------------------------------
# Profie-Photo
image {
    monitor =
    path = /home/halcyon/Pictures/screenshot-2026-01-14_14-13-57 (Edited).png
    border_size = 2
    border_color = rgba(255, 255, 255, 0)
    size = 130
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 0, -50
    halign = center
    valign = center
}
# Username greeting
label {
    monitor =
    text = Hi, $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 20
    font_family = Cartograph CF Bold Italic
    # position = 0, -100
    position = 0, -180
    halign = center
    valign = center
}
# Password Input Field
input-field {
    monitor =
    size = 250, 55
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height (0.2 - 0.8)
    dots_spacing = 0.2 # Scale of dots' absolute size (0.0 - 1.0)
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Cartograph CF Bold Italic
    placeholder_text = <span foreground="##ffffff99">Input Password</span>
    hide_input = false
    # position = 0, -153
    position = 0, -233
    halign = center
    valign = center
}
