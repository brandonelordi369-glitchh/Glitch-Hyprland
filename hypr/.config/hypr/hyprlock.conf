# ============================================================================
# Hyprlock Configuration with Music Player Widget
# ============================================================================

# ----------------------------------------------------------------------------
# Background
# ----------------------------------------------------------------------------
background {
    monitor =
    path = /home/halcyon/Pictures/leaves-blue-3840x2160-17461.jpeg
    blur_passes = 2
    contrast = 0.9651
    brightness = 0.5500
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
    # noise = 0.03
}

# ----------------------------------------------------------------------------
# General Settings
# ----------------------------------------------------------------------------
general {
    ignore_empty_input = true
    hide_cursor = true
}

# ----------------------------------------------------------------------------
# Animations
# ----------------------------------------------------------------------------
animations {
    animation = fade,    1, 6, default
    animation = fadeIn,  1, 6, default
    animation = fadeOut, 1, 6, default
}

# ----------------------------------------------------------------------------
# Password Input Field
# ----------------------------------------------------------------------------
input-field {
    monitor =
    size = 250, 55
    outline_thickness = 2
    dots_size = 0.2      # Scale of input-field height (0.2 - 0.8)
    dots_spacing = 0.2   # Scale of dots' absolute size (0.0 - 1.0)
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    font_family = OpenDyslexicAlt Nerd Font Propo Italic
    placeholder_text = <span foreground="##ffffff99">Input Password</span>
    hide_input = false
    # position = 0, -153
    position = 0, -233
    halign = center
    valign = center
}

# ----------------------------------------------------------------------------
# Clock & Date Display
# ----------------------------------------------------------------------------

# Time (large display)
label {
    monitor =
    text = $TIME
    color = rgba(216, 222, 233, 0.70)
    font_size = 140
    font_family = Carbona Test Bold
    position = 0, 260
    halign = center
    valign = center
}

# Date (day and month)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 30
    font_family = Carbona Test
    position = 0, 150
    halign = center
    valign = center
}

# Lock Icon
label {
    monitor =
    text = <span> </span>
    color = rgba(216, 222, 233, 0.70)
    font_size = 24
    font_family = OpenDyslexicAlt Nerd Font Propo
    position = 0, -110
    halign = center
    valign = top
}

# ----------------------------------------------------------------------------
# User Profile
# ----------------------------------------------------------------------------

# Profile photo
image {
    monitor =
    path = $HOME/Pictures/user.jpg
    border_color = rgba(216, 222, 233, 0.70)
    border_size = 3
    size = 160
    rounding = -1        # -1 = circle
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 0, 15
    halign = center
    valign = center
}

# Username greeting
label {
    monitor =
    text = Hi, $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 20
    font_family = Cartograph CF Bold Italic
    # position = 0, -100
    position = 0, -180
    halign = center
    valign = center
}



